<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2=".6" y2="1">
      <stop offset="0%" stop-color="#3b4252"/>
      <stop offset="100%" stop-color="#2e3440"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bf616a"/>
      <stop offset="16%" stop-color="#d08770"/>
      <stop offset="33%" stop-color="#ebcb8b"/>
      <stop offset="50%" stop-color="#a3be8c"/>
      <stop offset="66%" stop-color="#88c0d0"/>
      <stop offset="83%" stop-color="#5e81ac"/>
      <stop offset="100%" stop-color="#b48ead"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b4252"/>
      <stop offset="100%" stop-color="#2e3440"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="280" height="280" rx="56"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#434c5e" stroke-width="0.5" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Rainbow top strip -->
  <rect x="0" y="0" width="1280" height="5" fill="url(#bar)"/>

  <!-- Decorative corner blobs -->
  <g opacity="0.1">
    <circle cx="1120" cy="80" r="70" fill="#88c0d0"/>
    <circle cx="1220" cy="130" r="45" fill="#b48ead"/>
    <circle cx="100" cy="560" r="55" fill="#5e81ac"/>
    <circle cx="50" cy="600" r="30" fill="#d08770"/>
  </g>

  <!-- ═══ Icon (280x280) ═══ -->
  <g transform="translate(220, 100)" filter="url(#shadow)">
    <rect width="280" height="280" rx="56" fill="url(#iconBg)"/>

    <!-- Rainbow strip on icon -->
    <g clip-path="url(#iconClip)">
      <rect width="280" height="7" fill="url(#bar)"/>
    </g>

    <!-- Title bar dots -->
    <circle cx="38" cy="32" r="7" fill="#bf616a" opacity="0.7"/>
    <circle cx="60" cy="32" r="7" fill="#ebcb8b" opacity="0.7"/>
    <circle cx="82" cy="32" r="7" fill="#a3be8c" opacity="0.7"/>

    <!-- Separator -->
    <line x1="20" y1="50" x2="260" y2="50" stroke="#434c5e" stroke-width="1" opacity="0.5"/>

    <!-- Prompt >_ -->
    <g filter="url(#glow)">
      <path d="M48 80 L110 136 L48 192" fill="none" stroke="#88c0d0" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="134" y="172" width="76" height="20" rx="6" fill="#a3be8c" opacity="0.9"/>
    </g>

    <!-- Hub constellation -->
    <g filter="url(#softglow)">
      <circle cx="176" cy="76" r="8" fill="#b48ead" opacity="0.6"/>
      <circle cx="220" cy="64" r="6" fill="#88c0d0" opacity="0.6"/>
      <circle cx="238" cy="100" r="7" fill="#ebcb8b" opacity="0.6"/>
      <circle cx="212" cy="116" r="5.5" fill="#d08770" opacity="0.6"/>
      <circle cx="214" cy="88" r="10" fill="#5e81ac" opacity="0.45"/>
      <line x1="176" y1="76" x2="214" y2="88" stroke="#b48ead" stroke-width="1.5" opacity="0.35"/>
      <line x1="214" y1="88" x2="220" y2="64" stroke="#88c0d0" stroke-width="1.5" opacity="0.35"/>
      <line x1="214" y1="88" x2="238" y2="100" stroke="#ebcb8b" stroke-width="1.5" opacity="0.35"/>
      <line x1="214" y1="88" x2="212" y2="116" stroke="#d08770" stroke-width="1.5" opacity="0.35"/>
    </g>

    <!-- Code lines -->
    <g opacity="0.2">
      <rect x="48" y="218" width="88" height="7" rx="3.5" fill="#88c0d0"/>
      <rect x="142" y="218" width="42" height="7" rx="3.5" fill="#ebcb8b"/>
      <rect x="190" y="218" width="32" height="7" rx="3.5" fill="#a3be8c"/>
      <rect x="48" y="232" width="52" height="7" rx="3.5" fill="#b48ead"/>
      <rect x="106" y="232" width="72" height="7" rx="3.5" fill="#5e81ac"/>
      <rect x="184" y="232" width="44" height="7" rx="3.5" fill="#d08770"/>
      <rect x="48" y="246" width="110" height="7" rx="3.5" fill="#a3be8c"/>
      <rect x="164" y="246" width="30" height="7" rx="3.5" fill="#bf616a"/>
    </g>
  </g>

  <!-- ═══ Text ═══ -->
  <g transform="translate(550, 100)">
    <!-- TermHub wordmark -->
    <text x="0" y="130" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="120" font-weight="800" letter-spacing="5">
      <tspan fill="#88c0d0">Term</tspan><tspan fill="#d8dee9">Hub</tspan>
    </text>

    <!-- Tagline -->
    <text x="6" y="176" font-family="'Inter','SF Pro Display','Helvetica Neue',sans-serif" font-size="28" font-weight="500" fill="#616e88" letter-spacing="4">
      YOUR RESUME IN. PORTFOLIO OUT.
    </text>

    <!-- Rainbow accent bar -->
    <rect x="4" y="196" width="480" height="5" rx="2.5" fill="url(#bar)" opacity="0.6"/>

    <!-- Badges (larger) -->
    <g transform="translate(4, 224)">
      <rect width="68" height="30" rx="15" fill="#88c0d020" stroke="#88c0d040" stroke-width="1"/>
      <text x="34" y="20" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="14" font-weight="600" fill="#88c0d0">v1.0</text>
    </g>
    <g transform="translate(82, 224)">
      <rect width="78" height="30" rx="15" fill="#a3be8c20" stroke="#a3be8c40" stroke-width="1"/>
      <text x="39" y="20" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="14" font-weight="600" fill="#a3be8c">React</text>
    </g>
    <g transform="translate(170, 224)">
      <rect width="130" height="30" rx="15" fill="#b48ead20" stroke="#b48ead40" stroke-width="1"/>
      <text x="65" y="20" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="14" font-weight="600" fill="#b48ead">Open Source</text>
    </g>
    <g transform="translate(310, 224)">
      <rect width="74" height="30" rx="15" fill="#bf616a20" stroke="#bf616a40" stroke-width="1"/>
      <text x="37" y="20" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="14" font-weight="600" fill="#bf616a">MCP</text>
    </g>
    <g transform="translate(394, 224)">
      <rect width="74" height="30" rx="15" fill="#ebcb8b20" stroke="#ebcb8b40" stroke-width="1"/>
      <text x="37" y="20" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="14" font-weight="600" fill="#ebcb8b">i18n</text>
    </g>
  </g>

  <!-- Subtitle -->
  <text x="640" y="510" text-anchor="middle" font-family="'Inter','SF Pro Display','Helvetica Neue',sans-serif" font-size="22" fill="#4c566a" letter-spacing="1.5">
    Terminal-themed portfolio for developers, researchers, and creatives
  </text>

  <!-- Bottom rainbow strip -->
  <rect x="0" y="635" width="1280" height="5" fill="url(#bar)"/>

  <!-- Decorative code lines (bottom) -->
  <g opacity="0.07">
    <rect x="200" y="554" width="140" height="7" rx="3.5" fill="#88c0d0"/>
    <rect x="350" y="554" width="70" height="7" rx="3.5" fill="#a3be8c"/>
    <rect x="200" y="570" width="90" height="7" rx="3.5" fill="#b48ead"/>
    <rect x="300" y="570" width="120" height="7" rx="3.5" fill="#5e81ac"/>
    <rect x="820" y="554" width="100" height="7" rx="3.5" fill="#ebcb8b"/>
    <rect x="930" y="554" width="160" height="7" rx="3.5" fill="#88c0d0"/>
    <rect x="820" y="570" width="70" height="7" rx="3.5" fill="#d08770"/>
    <rect x="900" y="570" width="130" height="7" rx="3.5" fill="#a3be8c"/>
  </g>
</svg>
