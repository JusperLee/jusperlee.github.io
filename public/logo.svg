<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2=".6" y2="1">
      <stop offset="0%" stop-color="#3b4252"/>
      <stop offset="100%" stop-color="#2e3440"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bf616a"/>
      <stop offset="16%" stop-color="#d08770"/>
      <stop offset="33%" stop-color="#ebcb8b"/>
      <stop offset="50%" stop-color="#a3be8c"/>
      <stop offset="66%" stop-color="#88c0d0"/>
      <stop offset="83%" stop-color="#5e81ac"/>
      <stop offset="100%" stop-color="#b48ead"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b4252"/>
      <stop offset="100%" stop-color="#2e3440"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="12" y="12" width="176" height="176" rx="36"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ═══ Icon (left) ═══ -->
  <g filter="url(#shadow)">
    <rect x="12" y="12" width="176" height="176" rx="36" fill="url(#iconBg)"/>
  </g>

  <!-- Rainbow top strip -->
  <g clip-path="url(#iconClip)">
    <rect x="12" y="12" width="176" height="5" fill="url(#bar)"/>
  </g>

  <!-- Title bar dots -->
  <circle cx="36" cy="32" r="4.5" fill="#bf616a" opacity="0.7"/>
  <circle cx="50" cy="32" r="4.5" fill="#ebcb8b" opacity="0.7"/>
  <circle cx="64" cy="32" r="4.5" fill="#a3be8c" opacity="0.7"/>

  <!-- Title bar separator -->
  <line x1="24" y1="44" x2="176" y2="44" stroke="#434c5e" stroke-width="0.8" opacity="0.5"/>

  <!-- Prompt >_ -->
  <g filter="url(#glow)">
    <path d="M42 62 L82 98 L42 134" fill="none" stroke="#88c0d0" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="100" y="120" width="50" height="14" rx="4" fill="#a3be8c" opacity="0.9"/>
  </g>

  <!-- Hub constellation -->
  <g filter="url(#softglow)">
    <circle cx="130" cy="58" r="5.5" fill="#b48ead" opacity="0.6"/>
    <circle cx="158" cy="50" r="4" fill="#88c0d0" opacity="0.6"/>
    <circle cx="168" cy="74" r="4.5" fill="#ebcb8b" opacity="0.6"/>
    <circle cx="148" cy="82" r="3.5" fill="#d08770" opacity="0.6"/>
    <circle cx="150" cy="65" r="6.5" fill="#5e81ac" opacity="0.45"/>
    <!-- Edges -->
    <line x1="130" y1="58" x2="150" y2="65" stroke="#b48ead" stroke-width="1.3" opacity="0.35"/>
    <line x1="150" y1="65" x2="158" y2="50" stroke="#88c0d0" stroke-width="1.3" opacity="0.35"/>
    <line x1="150" y1="65" x2="168" y2="74" stroke="#ebcb8b" stroke-width="1.3" opacity="0.35"/>
    <line x1="150" y1="65" x2="148" y2="82" stroke="#d08770" stroke-width="1.3" opacity="0.35"/>
    <line x1="130" y1="58" x2="158" y2="50" stroke="#4c566a" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Decorative code lines -->
  <g opacity="0.22">
    <rect x="42" y="152" width="60" height="5" rx="2.5" fill="#88c0d0"/>
    <rect x="108" y="152" width="28" height="5" rx="2.5" fill="#ebcb8b"/>
    <rect x="142" y="152" width="22" height="5" rx="2.5" fill="#a3be8c"/>
    <rect x="42" y="163" width="36" height="5" rx="2.5" fill="#b48ead"/>
    <rect x="84" y="163" width="50" height="5" rx="2.5" fill="#5e81ac"/>
    <rect x="140" y="163" width="30" height="5" rx="2.5" fill="#d08770"/>
    <rect x="42" y="174" width="80" height="5" rx="2.5" fill="#a3be8c"/>
    <rect x="128" y="174" width="20" height="5" rx="2.5" fill="#bf616a"/>
  </g>

  <!-- ═══ Text (right) ═══ -->

  <!-- TermHub wordmark -->
  <text x="218" y="112" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace" font-size="72" font-weight="800" letter-spacing="3">
    <tspan fill="#88c0d0">Term</tspan><tspan fill="#d8dee9">Hub</tspan>
  </text>

  <!-- Tagline -->
  <text x="222" y="144" font-family="'Inter','SF Pro Display','Helvetica Neue',sans-serif" font-size="16" font-weight="500" fill="#616e88" letter-spacing="2.5">
    TERMINAL PORTFOLIO TEMPLATE
  </text>

  <!-- Rainbow accent bar under tagline -->
  <rect x="220" y="156" width="280" height="3" rx="1.5" fill="url(#bar)" opacity="0.6"/>

  <!-- Version badge -->
  <g transform="translate(220, 168)">
    <rect width="46" height="18" rx="9" fill="#88c0d020" stroke="#88c0d040" stroke-width="1"/>
    <text x="23" y="13" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="600" fill="#88c0d0">v1.0</text>
  </g>
  <g transform="translate(274, 168)">
    <rect width="76" height="18" rx="9" fill="#a3be8c20" stroke="#a3be8c40" stroke-width="1"/>
    <text x="38" y="13" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="600" fill="#a3be8c">GPL-3.0</text>
  </g>
  <g transform="translate(358, 168)">
    <rect width="90" height="18" rx="9" fill="#b48ead20" stroke="#b48ead40" stroke-width="1"/>
    <text x="45" y="13" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="600" fill="#b48ead">Open Source</text>
  </g>
</svg>
