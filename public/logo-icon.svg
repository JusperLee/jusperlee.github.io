<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2=".6" y2="1">
      <stop offset="0%" stop-color="#3b4252"/>
      <stop offset="100%" stop-color="#2e3440"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bf616a"/>
      <stop offset="16%" stop-color="#d08770"/>
      <stop offset="33%" stop-color="#ebcb8b"/>
      <stop offset="50%" stop-color="#a3be8c"/>
      <stop offset="66%" stop-color="#88c0d0"/>
      <stop offset="83%" stop-color="#5e81ac"/>
      <stop offset="100%" stop-color="#b48ead"/>
    </linearGradient>
    <clipPath id="body">
      <rect x="16" y="16" width="248" height="248" rx="44"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Body -->
  <rect x="16" y="16" width="248" height="248" rx="44" fill="url(#bg)"/>

  <!-- Rainbow strip -->
  <g clip-path="url(#body)">
    <rect x="16" y="16" width="248" height="5" fill="url(#bar)"/>
  </g>

  <!-- Title bar dots -->
  <circle cx="44" cy="40" r="5" fill="#bf616a" opacity="0.7"/>
  <circle cx="60" cy="40" r="5" fill="#ebcb8b" opacity="0.7"/>
  <circle cx="76" cy="40" r="5" fill="#a3be8c" opacity="0.7"/>

  <!-- Title bar separator -->
  <line x1="30" y1="54" x2="250" y2="54" stroke="#434c5e" stroke-width="1" opacity="0.5"/>

  <!-- Prompt >_ -->
  <g filter="url(#glow)">
    <path d="M56 78 L104 122 L56 166" fill="none" stroke="#88c0d0" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="124" y="152" width="60" height="16" rx="5" fill="#a3be8c" opacity="0.9"/>
  </g>

  <!-- Hub constellation -->
  <g filter="url(#softglow)">
    <circle cx="172" cy="76" r="7" fill="#b48ead" opacity="0.6"/>
    <circle cx="210" cy="66" r="5" fill="#88c0d0" opacity="0.6"/>
    <circle cx="226" cy="96" r="5.5" fill="#ebcb8b" opacity="0.6"/>
    <circle cx="198" cy="108" r="4.5" fill="#d08770" opacity="0.6"/>
    <circle cx="200" cy="86" r="8" fill="#5e81ac" opacity="0.45"/>
    <line x1="172" y1="76" x2="200" y2="86" stroke="#b48ead" stroke-width="1.5" opacity="0.35"/>
    <line x1="200" y1="86" x2="210" y2="66" stroke="#88c0d0" stroke-width="1.5" opacity="0.35"/>
    <line x1="200" y1="86" x2="226" y2="96" stroke="#ebcb8b" stroke-width="1.5" opacity="0.35"/>
    <line x1="200" y1="86" x2="198" y2="108" stroke="#d08770" stroke-width="1.5" opacity="0.35"/>
  </g>

  <!-- Decorative code lines -->
  <g opacity="0.2">
    <rect x="56" y="196" width="80" height="6" rx="3" fill="#88c0d0"/>
    <rect x="142" y="196" width="36" height="6" rx="3" fill="#ebcb8b"/>
    <rect x="184" y="196" width="44" height="6" rx="3" fill="#a3be8c"/>
    <rect x="56" y="210" width="48" height="6" rx="3" fill="#b48ead"/>
    <rect x="110" y="210" width="66" height="6" rx="3" fill="#5e81ac"/>
    <rect x="182" y="210" width="38" height="6" rx="3" fill="#d08770"/>
    <rect x="56" y="224" width="100" height="6" rx="3" fill="#a3be8c"/>
    <rect x="164" y="224" width="30" height="6" rx="3" fill="#bf616a"/>
    <rect x="200" y="224" width="28" height="6" rx="3" fill="#88c0d0"/>
  </g>
</svg>
